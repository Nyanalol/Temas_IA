name: CI

on:
  push:
    branches: ["main", "restructure", "feat/**", "fix/**"]
  pull_request:
    branches: ["main", "restructure"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-check:
    name: Lint & Import check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ensure all packages are importable
        run: echo "$GITHUB_WORKSPACE" > .venv/lib/python3.11/site-packages/temas_ia_src.pth

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Check imports
        env:
          PYTHONPATH: ${{ github.workspace }}
          # Variables de entorno mínimas para que config.py no falle
          LLM_PROVIDER: ollama
          LLM_MODEL: llama3
          LLM_TEMPERATURE: "0"
          EMBEDDING_PROVIDER: ollama
          EMBEDDING_MODEL: nomic-embed-text
          ICLOUD_EMAIL: ci@example.com
          ICLOUD_APP_PASSWORD: fake-password
          ICLOUD_DEFAULT_CALENDAR: Calendario
          API_KEY: ci-fake-key
        run: |
          .venv/bin/python - << 'EOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          import agents; print('agents OK')
          import events; print('events OK')
          import rag; print('rag OK')
          from agents.models import IncidentExtraction, IncidentResponse; print('models OK')
          from events.models import EventExtraction, AlarmInput; print('event models OK')
          from events.api import app; print('events API OK')
          EOF

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        env:
          LLM_PROVIDER: ollama
          LLM_MODEL: llama3
          LLM_TEMPERATURE: "0"
          EMBEDDING_PROVIDER: ollama
          EMBEDDING_MODEL: nomic-embed-text
          ICLOUD_EMAIL: ci@example.com
          ICLOUD_APP_PASSWORD: fake-password
          ICLOUD_DEFAULT_CALENDAR: Calendario
          API_KEY: ci-fake-key
        run: uv run pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet — add them in tests/"

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl --silent --show-error --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
